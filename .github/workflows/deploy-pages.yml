name: Deploy game to GitHub Pages

# Perihelion's compiled output (perihelion.mjs, march_*.mjs) is checked
# into the repo -- see README -- so this workflow doesn't build anything,
# it just publishes the runtime files the game actually needs (not lib/,
# test/, docs/) as a static site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage game files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp perihelion.mjs _site/
          cp march_runtime.mjs march_dom.mjs march_canvas.mjs march_audio.mjs march_webgl.mjs _site/
          [ -f perihelion.mjs.map ] && cp perihelion.mjs.map _site/ || true
          [ -d pixel_icons ] && cp -r pixel_icons _site/ || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
